name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flipper
          POSTGRES_USER: flipper
          POSTGRES_PASSWORD: flipperpass
        options: >-
          --health-cmd="pg_isready -U flipper -d flipper"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Start MQTT broker
        run: |
          docker run -d --name flipper_mqtt -p 1883:1883 \
            -v "${{ github.workspace }}/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          for i in $(seq 1 15); do
            if docker exec flipper_mqtt mosquitto_sub -t '$SYS/broker/version' -C 1 -W 2 -i healthcheck 2>/dev/null; then
              echo "MQTT broker ready"
              exit 0
            fi
            sleep 1
          done
          echo "MQTT broker failed to become ready"
          docker logs flipper_mqtt
          exit 1

      - name: Initialize database
        env:
          PGPASSWORD: flipperpass
        run: |
          for f in db/init/*.sql; do
            echo "Applying $f"
            psql -h 127.0.0.1 -U flipper -d flipper -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run tests
        env:
          APP_PORT: 8080
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: flipper
          DB_PASSWORD: flipperpass
          DB_NAME: flipper
          REDIS_URL: redis://127.0.0.1:6379
          REDIS_SESSION_TTL_SECONDS: 1800
          MQTT_BROKER_HOST: 127.0.0.1
          MQTT_BROKER_PORT: 1883
          MQTT_TOPIC_FILTER: "flipper/#"
          LOG_LEVEL: INFO
        run: pytest tests/ -v

  architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import-linter
        run: lint-imports

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flipper-backend .

name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  tests:
    runs-on: ubuntu-latest
    env:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: flipper
      MYSQL_USER: flipper
      MYSQL_PASSWORD: flipperpass
    services:
      db:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_USER: ${{ env.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ env.MYSQL_PASSWORD }}
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Load environment variables
        run: cat Flipper_Center/back/.env >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r Flipper_Center/back/requirements.txt

      - name: Wait for MySQL
        run: |
          set -a; source Flipper_Center/back/.env; set +a
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u $DB_USER -p$DB_PASSWORD && break
            sleep 1
          done

      - name: Initialize database
        run: |
          set -a; source Flipper_Center/back/.env; set +a
          mysql -h 127.0.0.1 -u $DB_USER -p$DB_PASSWORD $DB_NAME < Flipper_Center/back/db/init/001_create_players.sql

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
        run: pytest Flipper_Center/back/tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flipper-backend .

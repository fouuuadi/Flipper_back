name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: flipper
          MYSQL_USER: flipper
          MYSQL_PASSWORD: flipperpass
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        env:
          DB_HOST: 127.0.0.1
          DB_USER: flipper
          DB_PASSWORD: flipperpass
          DB_NAME: flipper
        run: |
          mysql -h 127.0.0.1 -u flipper -pflipperpass flipper < db/init/001_create_players.sql
          mysql -h 127.0.0.1 -u flipper -pflipperpass flipper < db/init/002_create_rooms.sql
          mysql -h 127.0.0.1 -u flipper -pflipperpass flipper < db/init/003_create_games.sql
          mysql -h 127.0.0.1 -u flipper -pflipperpass flipper < db/init/004_create_game_events.sql

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: flipper
          DB_PASSWORD: flipperpass
          DB_NAME: flipper
          MYSQL_DATABASE: flipper
          REDIS_URL: redis://127.0.0.1:6379
        run: pytest tests/ -v

  architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import-linter
        run: lint-imports

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flipper-backend .